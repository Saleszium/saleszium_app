services:
  sz-server:
    build:
      context: ./sz-server
      dockerfile: Dockerfile
    container_name: sz-server
    ports:
      - "5001:5001"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      backendai:
        condition: service_started
    networks:
      - saleszium-network
    volumes:
      - ./sz-server:/app
      - /app/node_modules

  backendai:
    build:
      context: ./backendai
      dockerfile: Dockerfile
    container_name: backendai
    ports:
      - "5002:5002"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
    networks:
      - saleszium-network
    volumes:
      - ./backendai:/app

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6380:6379"
    networks:
      - saleszium-network

  postgres:
    image: pgvector/pgvector:pg15
    container_name: postgres
    ports:
      - "5435:5432"
    environment:
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
      - CRM_DB_NAME=${CRM_DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-crm-db.sh:/docker-entrypoint-initdb.d/init-crm-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - saleszium-network

networks:
  saleszium-network:
    driver: bridge

volumes:
  postgres_data:
