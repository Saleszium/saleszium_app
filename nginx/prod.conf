upstream backend {
    server sz-server:5000;
}
client_max_body_size 50M;

# Redirect all HTTP traffic to HTTPS
server {
    listen 80;
    server_name api.saleszium.com api-ai.saleszium.com;
    
    # Allow certbot challenges
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# Backend API - api.saleszium.com
server {
    listen 443 ssl;
    server_name api.saleszium.com;

    ssl_certificate /etc/letsencrypt/live/api.saleszium.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.saleszium.com/privkey.pem;

    location / {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# AI Service - api-ai.saleszium.com
server {
    listen 443 ssl;
    server_name api-ai.saleszium.com;

    ssl_certificate /etc/letsencrypt/live/api.saleszium.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.saleszium.com/privkey.pem;

    location / {
        proxy_pass http://backendai:5002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
